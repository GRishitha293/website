<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RR Enterprises</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-section">
    <img src="rr.jpg.jpeg" class="logo">
    <div>
      <h1>RR Enterprises</h1>
      <p>Kishan Bagh, Mangalhat, Hyderabad - 500006</p>
    </div>
  </div>
  <div>Cart: <span id="cart-count">0</span></div>
</header>

<div class="products" id="product-list"></div>

<!-- Bottom Cart Bar -->
<div class="cart-bar" id="cart-bar">
  <span id="cart-summary">0 items | ₹0</span>
  <button onclick="toggleCart()">View Cart</button>
</div>

<!-- Cart Drawer -->
<div class="cart-box" id="cart-box">
  <h2>Your Cart <button onclick="toggleCart()" class="close-btn">×</button></h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>

  <button onclick="clearCart()" class="clear-btn">Clear Cart</button>

  <a id="whatsapp-btn" target="_blank">
    <button class="whatsapp">Order on WhatsApp</button>
  </a>

  <h3>Payment Options:</h3>
  <button onclick="payGPay()" class="payment-btn">Pay with Google Pay</button>
  <button onclick="payPhonePe()" class="payment-btn">Pay with PhonePe</button>
  <button onclick="cod()" class="payment-btn">Cash on Delivery</button>
</div>

<section id="contact">
  <h2>Contact Details</h2>
  <p>Phone: +91 9392829603</p>
</section>

<script src="script.js"></script>
</body>
</html>
